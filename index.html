<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Music Recommendation Analyzer</title>

  <style>
    body {
      font-family: Arial;
      margin: 24px;
      max-width: 700px;
    }

    input, button {
      padding: 8px;
      margin: 4px;
    }

    #list, #result {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      white-space: pre-line;
    }
  </style>
</head>
<body>

<h2>Music Recommendation Analyzer</h2>

<p>
Bagaimana mengetahui rekomendasi lagu berdasarkan
riwayat pemutaran pengguna sebelumnya?
</p>

<input id="song" placeholder="Nama Lagu">
<input id="artist" placeholder="Nama Artis">

<button onclick="tambah()">Tambah Lagu</button>
<button onclick="analisis()">Dapatkan Rekomendasi</button>

<p id="total">Total Lagu: 0</p>

<h3>Riwayat Pemutaran:</h3>
<div id="list">Belum ada data</div>

<h3>Rekomendasi AI:</h3>
<div id="result">Belum dianalisis</div>

<script>

let historyMusic = [];

function render() {

  let text = "";

  historyMusic.forEach((d, i) => {

    text +=
      (i + 1) +
      ". " +
      d.song +
      " - " +
      d.artist +
      "\n";

  });

  document.getElementById("total").innerText =
    "Total Lagu: " + historyMusic.length;

  document.getElementById("list").innerText =
    text || "Belum ada data";
}

function tambah() {

  const song =
    document.getElementById("song").value;

  const artist =
    document.getElementById("artist").value;

  if (!song || !artist) {
    alert("Isi nama lagu dan artis");
    return;
  }

  historyMusic.push({
    song,
    artist
  });

  document.getElementById("song").value = "";
  document.getElementById("artist").value = "";

  render();
}

async function analisis() {

  if (historyMusic.length === 0) {
    alert("Masukkan riwayat lagu terlebih dahulu");
    return;
  }

  document.getElementById("result").innerText =
    "Mencari rekomendasi lagu...";

  const daftarLagu =
    historyMusic.map((d, i) =>
      (i + 1) +
      ". " +
      d.song +
      " - " +
      d.artist
    ).join("\n");

  try {

    const res = await fetch(
      "https://music-ai-backend.vercel.app/api/recommend",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          songs: daftarLagu
        })
      }
    );

    const json = await res.json();

    document.getElementById("result").innerText =
      json.result || json.error;

  } catch {

    document.getElementById("result").innerText =
      "Gagal terhubung ke AI";

  }
}

render();

</script>

</body>
</html>
